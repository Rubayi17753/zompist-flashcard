<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flashcards</title>

<link rel="stylesheet" href="styles.css">

<!-- Data -->
<script src="cards.js"></script>

<!-- Logic (deferred so DOM is ready) -->
<script src="app.js" defer></script>
</head>

<body>

<h2>Flashcards</h2>

<div id="card" class="card"></div>

<input type="text" id="pinyin" placeholder="Pinyin">
<input type="text" id="gloss" placeholder="Gloss">

<div class="controls">
  <button id="nextBtn">Next</button>
  <button id="forgetBtn">Forget</button>
  <button id="resetBtn">Reset</button>
  <button id="pinyinBtn">Toggle Pinyin</button>
  <button id="glossBtn">Toggle Gloss</button>
</div>

<p>
Which set?
<select id="setSelect"></select>
</p>

</body>
</html>
