<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flashcards</title>

<!-- 
  cards.js must define:
  const cards = [
    { set: "Radicals 1", hanzi: "中", pinyin: "zhōng", gloss: "middle" },
    ...
  ];
-->
<script src="cards.js"></script>

<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
    background: #FFE0E0;
  }

  .card {
    font-size: 10vw;
    max-font-size: 80px;
    background: white;
    padding: 1rem 2rem;
    border: 1px solid #ccc;
    margin-bottom: 1rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  input, button, select {
    font-size: 1rem;
    padding: 0.5rem;
  }
</style>
</head>

<body>

<h2>Flashcards</h2>

<div id="card" class="card"></div>

<input type="text" id="pinyin" placeholder="Pinyin">
<input type="text" id="gloss" placeholder="Gloss">

<div class="controls">
  <button onclick="nextCard()">Next</button>
  <button onclick="forgetCard()">Forget</button>
  <button onclick="resetSet()">Reset</button>
  <button onclick="togglePinyin()">Toggle Pinyin</button>
  <button onclick="toggleGloss()">Toggle Gloss</button>
</div>

<p>
Which set?
<select id="setSelect" onchange="changeSet()"></select>
</p>

<script>
// ===== STATE =====

// Whether to show pinyin / gloss
let showPinyin = false;
let showGloss = false;

// Grouped cards by set
let sets = {};

// Current working set
let currentSetName = null;
let currentCards = [];
let activeCount = 0;

// Current card index (within active subset)
let currentIndex = 0;


// ===== INITIALIZATION =====

// Group cards by set for efficient access
function groupBySet() {
  cards.forEach(c => {
    if (!sets[c.set]) sets[c.set] = [];
    sets[c.set].push(c);
  });
}

// Populate dropdown
function populateSets() {
  const select = document.getElementById("setSelect");
  Object.keys(sets).forEach((setName, i) => {
    const opt = document.createElement("option");
    opt.value = setName;
    opt.textContent = setName;
    select.appendChild(opt);

    if (i === 0) currentSetName = setName;
  });
}

// Initialize current set
function initSet(name) {
  currentSetName = name;
  currentCards = [...sets[name]]; // shallow copy
  activeCount = currentCards.length;
  currentIndex = 0;
}


// ===== CARD LOGIC =====

// Random integer
function rand(n) {
  return Math.floor(Math.random() * n);
}

// Display current card
function render() {
  const card = currentCards[currentIndex];
  document.getElementById("card").textContent = card.hanzi;

  document.getElementById("pinyin").value = showPinyin ? card.pinyin : "";
  document.getElementById("gloss").value = showGloss ? card.gloss : "";
}

// Next card (random, avoid repeat)
function nextCard() {
  if (activeCount <= 1) return;

  let i;
  do {
    i = rand(activeCount);
  } while (i === currentIndex);

  currentIndex = i;
  render();
}

// Remove known card (swap trick)
function forgetCard() {
  if (activeCount <= 1) return;

  const last = activeCount - 1;

  // Swap current with last active
  [currentCards[currentIndex], currentCards[last]] =
    [currentCards[last], currentCards[currentIndex]];

  activeCount--;

  nextCard();
}


// ===== UI CONTROLS =====

function togglePinyin() {
  showPinyin = !showPinyin;
  render();
}

function toggleGloss() {
  showGloss = !showGloss;
  render();
}

function changeSet() {
  const name = document.getElementById("setSelect").value;
  initSet(name);
  render();
}

function resetSet() {
  initSet(currentSetName);
  render();
}

// ===== STARTUP =====

groupBySet();
populateSets();
initSet(currentSetName);
render();

</script>

</body>
</html>
